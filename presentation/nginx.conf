# ============================================================
# Presentation Tier (nginx) 설정
#  - "/"        : 프론트엔드 화면(HTML/CSS/JS) 서빙
#  - "/api/"    : 백엔드(Flask) 컨테이너로 요청 전달 (리버스 프록시)
#    -> 브라우저는 nginx 한 곳만 보고, 백엔드 주소를 몰라도 됨
# ============================================================

server {
    listen 80;
    server_name localhost;

    # 프론트엔드 정적 파일
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API 요청은 Flask 컨테이너(app:5000)로 전달
    # 'app' 은 docker-compose 가 만들어 주는 서비스 이름(=호스트명)
    location /api/ {
        proxy_pass         http://app:5000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
